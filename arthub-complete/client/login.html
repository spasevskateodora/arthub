<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtHub — Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; color: #111; margin: 0; padding: 0; }
    nav { border-bottom: 1px solid #ddd; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; background: #fff; }
    .nav-logo { font-family: Georgia, serif; font-size: 1.5rem; font-weight: bold; color: #111; text-decoration: none; }
    .nav-logo span { color: #6D1A2A; }
    .nav-back { font-size: 13px; color: #777; text-decoration: none; }
    .nav-back:hover { color: #111; }
    .page { min-height: calc(100vh - 56px); display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
    .login-box { width: 100%; max-width: 400px; border: 1px solid #ddd; padding: 2.5rem 2rem; background: #fff; }
    .login-box h2 { font-family: Georgia, serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 0.3rem; }
    .login-box h2 span { color: #6D1A2A; font-style: italic; }
    .subtitle { font-size: 13px; color: #777; margin-bottom: 2rem; }
    .subtitle a { color: #6D1A2A; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 9px 10px; border: 1px solid #ccc; font-family: Arial, sans-serif; font-size: 14px; color: #111; background: #fff; box-sizing: border-box; }
    input:focus { border-color: #111; outline: none; }
    input.error { border-color: #b00020; }
    .err-msg { font-size: 12px; color: #b00020; display: none; margin-top: 3px; }
    .err-msg.show { display: block; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 14px; color: #888; }
    .options-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.4rem; font-size: 13px; }
    .options-row label { display: flex; align-items: center; gap: 6px; margin: 0; cursor: pointer; color: #777; }
    .options-row a { color: #6D1A2A; text-decoration: none; }
    .btn-login { width: 100%; padding: 10px; background: #6D1A2A; border: none; color: white; font-family: Arial, sans-serif; font-size: 14px; cursor: pointer; margin-bottom: 1rem; }
    .btn-login:hover { background: #8B2236; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 1rem 0; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #ddd; }
    .divider span { font-size: 12px; color: #ccc; }
    .btn-guest { display: block; text-align: center; font-size: 13px; color: #777; text-decoration: none; padding: 9px; border: 1px solid #ddd; }
    .btn-guest:hover { border-color: #111; color: #111; }
    .error-box { display: none; background: #ffebee; border: 1px solid #f5c2c2; padding: 10px 14px; font-size: 13px; color: #b00020; margin-bottom: 14px; }
    .error-box.show { display: block; }
    .success-box { display: none; text-align: center; padding: 30px 0; }
    .success-box.show { display: block; }
    .success-box h3 { font-family: Georgia, serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 6px; }
    .success-box p { font-size: 13px; color: #777; }
    footer { text-align: center; padding: 20px; font-size: 12px; color: #bbb; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Art<span>Hub</span></a>
  <a href="index.html" class="nav-back">← Back to gallery</a>
</nav>

<div class="page">
  <div class="login-box">

    <div id="formSection">
      <h2>Sign in to <span>ArtHub</span></h2>
      <p class="subtitle">New here? <a href="register.html">Create an account</a></p>

      <div class="error-box" id="errorBox"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
        <div class="err-msg" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" />
          <button class="pw-toggle" type="button" onclick="togglePw()">👁</button>
        </div>
        <div class="err-msg" id="pwError">Password must be at least 6 characters.</div>
      </div>

      <div class="options-row">
        <label><input type="checkbox" id="remember" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn-login" onclick="doLogin()">Sign In</button>

      <div class="divider"><hr/><span>or</span><hr/></div>
      <a href="index.html" class="btn-guest">Continue as guest</a>
    </div>

    <div class="success-box" id="successBox">
      <div style="font-size:2rem; margin-bottom:10px;">✓</div>
      <h3 id="successTitle">Signed in successfully.</h3>
      <p id="successMsg">Redirecting...</p>
    </div>

  </div>
</div>

<footer>© 2024 ArtHub</footer>

<script>
  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    let ok = true;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('email').classList.toggle('error', !emailOk);
    document.getElementById('emailError').classList.toggle('show', !emailOk);
    if (!emailOk) ok = false;

    const pwOk = pw.length >= 6;
    document.getElementById('password').classList.toggle('error', !pwOk);
    document.getElementById('pwError').classList.toggle('show', !pwOk);
    if (!pwOk) ok = false;

    if (!ok) return;

    try {
      const res = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pw })
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById('errorBox').textContent = data.error || 'Login failed.';
        document.getElementById('errorBox').classList.add('show');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      document.getElementById('formSection').style.display = 'none';
      const successBox = document.getElementById('successBox');
      successBox.classList.add('show');

      if (data.user.role === 'admin') {
        document.getElementById('successTitle').textContent = 'Welcome back, Admin.';
        document.getElementById('successMsg').textContent = 'Redirecting to dashboard...';
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1500);
      } else {
        document.getElementById('successTitle').textContent = 'Welcome back!';
        document.getElementById('successMsg').textContent = 'Redirecting to gallery...';
        setTimeout(() => window.location.href = 'index.html', 1500);
      }

    } catch (err) {
      document.getElementById('errorBox').textContent = 'Server error. Try again.';
      document.getElementById('errorBox').classList.add('show');
    }
  }
</script>

</body>
</html>
